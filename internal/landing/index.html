<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="WA Gateway provides dependable WhatsApp messaging infrastructure.">
  <title>WA Gateway — WhatsApp messaging infrastructure</title>
  <style>
    :root{color-scheme:light;--ink:#10233f;--muted:#63738b;--blue:#1769e8;--line:#dfe7f1;--soft:#f4f8fd}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:#fff}
    .wrap{width:min(1120px,calc(100% - 40px));margin:auto}
    .nav{height:78px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;color:var(--ink);font-size:18px;font-weight:750;text-decoration:none}
    .mark{width:32px;height:32px;border-radius:10px;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:17px}
    .nav-link{border:1px solid var(--line);border-radius:9px;color:var(--ink);font-size:14px;font-weight:650;padding:10px 16px;text-decoration:none}
    .hero{min-height:calc(100vh - 78px);padding:76px 0 100px;display:flex;align-items:center}
    .hero-content{max-width:720px}
    .eyebrow{color:var(--blue);font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase}
    h1{font-size:clamp(44px,7vw,78px);line-height:1.02;letter-spacing:-.06em;margin:18px 0 24px}
    .intro{color:var(--muted);font-size:19px;line-height:1.65;margin:0;max-width:620px}
    .actions{display:flex;gap:12px;margin-top:34px}
    .btn{border-radius:9px;display:inline-block;font-size:15px;font-weight:650;padding:13px 19px;text-decoration:none}
    .primary{background:var(--blue);color:#fff}
    .secondary{background:var(--soft);border:1px solid var(--line);color:var(--ink)}
    .accent{margin-top:72px;background:var(--soft);border:1px solid var(--line);border-radius:18px;height:8px;max-width:340px;overflow:hidden}
    .accent span{background:var(--blue);display:block;height:100%;width:38%}
    .foot{border-top:1px solid var(--line);color:var(--muted);font-size:13px;padding:26px 0}
    @media(max-width:600px){.hero{min-height:calc(100vh - 78px);padding:48px 0 72px}.intro{font-size:17px}.actions{align-items:stretch;flex-direction:column;max-width:240px}.accent{margin-top:52px}}
  </style>
</head>
<body>
  <header class="wrap nav">
    <a class="brand" href="/"><span class="mark">✦</span>WA Gateway</a>
    <a class="nav-link" href="/admin">Admin panel</a>
  </header>
  <main class="wrap hero">
    <div class="hero-content">
      <div class="eyebrow">WhatsApp messaging infrastructure</div>
      <h1>Messaging that stays in motion.</h1>
      <p class="intro">Connect WhatsApp sessions, send messages through a dependable API, and keep your delivery operations moving from one focused gateway.</p>
      <div class="actions">
        <a class="btn primary" href="/admin">Open admin panel</a>
      </div>
      <div class="accent" aria-hidden="true"><span></span></div>
    </div>
  </main>
  <footer class="wrap foot">© 2026 WA Gateway</footer>
</body>
</html>
